site_name: netaudit
site_description: CI-native network egress auditing via strace
site_url: https://netaudit.readthedocs.io
repo_url: https://github.com/Azakira/netaudit
repo_name: Azakira/netaudit
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - attr_list
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - CLI Reference: cli-reference.md
  - Allowlist DSL: allowlist-dsl.md
  - Architecture: architecture.md
